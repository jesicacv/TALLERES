<section class="rounded-2xl bg-white border border-slate-200 shadow-sm overflow-hidden">
    <div class="px-4 py-4 border-b border-slate-200">
        <h4 class="text-lg font-semibold text-slate-900">Actividad Reciente</h4>
        <p class="text-sm text-slate-500">Ultimas ordenes de trabajo registradas.</p>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-sm">
            <thead class="bg-slate-50 text-left text-slate-600">
                <tr>
                    <th class="px-4 py-3">OT</th>
                    <th class="px-4 py-3">Patente</th>
                    <th class="px-4 py-3">Cliente</th>
                    <th class="px-4 py-3">Estado</th>
                </tr>
            </thead>
            <tbody>
                {% if recent_orders %}
                    {% for ot in recent_orders %}
                    <tr class="border-t border-slate-100">
                        <td class="px-4 py-3 font-medium text-slate-800">{{ ot.numero_ot }}</td>
                        <td class="px-4 py-3">{{ ot.patente }}</td>
                        <td class="px-4 py-3">{{ ot.cliente_rut }}</td>
                        <td class="px-4 py-3">
                            <span class="inline-flex rounded-full px-2 py-1 text-xs font-medium bg-slate-100 text-slate-700">{{ ot.estado.value }}</span>
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="4" class="px-4 py-6 text-center text-slate-500">No hay ordenes de trabajo registradas aun.</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </div>
</section>
