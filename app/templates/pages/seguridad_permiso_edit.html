{% extends "base/layout.html" %}
{% block title %}Editar Permiso | {{ app_name }}{% endblock %}
{% block content %}
<section class="space-y-4 max-w-4xl">
    <div class="flex items-center justify-between"><h3 class="text-2xl font-semibold">Editar Permiso {{ permiso.codigo }}</h3><a href="/seguridad/permisos" class="btn-secondary">Volver</a></div>

    <form method="post" action="/seguridad/permisos/{{ permiso.id }}/edit" class="grid grid-cols-1 md:grid-cols-2 gap-3 bg-white border border-slate-200 rounded-2xl p-4">
        <input required name="codigo" value="{{ permiso.codigo }}" class="field">
        <input required name="modulo" value="{{ permiso.modulo }}" class="field">
        <input name="descripcion" value="{{ permiso.descripcion or '' }}" class="field md:col-span-2">
        <div class="md:col-span-2 flex justify-end"><button class="btn-primary" type="submit">Guardar cambios</button></div>
    </form>
</section>
{% endblock %}
