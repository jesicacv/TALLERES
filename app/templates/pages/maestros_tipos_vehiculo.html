{% extends "base/layout.html" %}
{% block title %}Tipos de Vehiculo | {{ app_name }}{% endblock %}
{% block content %}
<section class="space-y-4">
    <h3 class="text-2xl font-semibold">Tipos de Vehiculo</h3>
    <p class="text-slate-600">Catalogo actual definido por enum en esta fase.</p>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
        {% for tipo in tipos_vehiculo %}
        <article class="bg-white rounded-xl border border-slate-200 p-4 text-center font-medium">{{ tipo }}</article>
        {% endfor %}
    </div>
</section>
{% endblock %}
