{% extends "base/layout.html" %}
{% block title %}Editar Cliente | {{ app_name }}{% endblock %}
{% block content %}
<section class="space-y-4 max-w-4xl">
    <div class="flex items-center justify-between">
        <h3 class="text-2xl font-semibold">Editar Cliente {{ cliente.rut }}</h3>
        <a href="/maestros/clientes" class="btn-secondary">Volver</a>
    </div>

    <form method="post" action="/maestros/clientes/{{ cliente.rut }}/edit" class="grid grid-cols-1 md:grid-cols-2 gap-3 bg-white border border-slate-200 rounded-2xl p-4">
        <input required name="nombre" value="{{ cliente.nombre }}" class="field">
        <input name="email" value="{{ cliente.email or '' }}" class="field">
        <input name="celular" value="{{ cliente.celular or '' }}" class="field">
        <input name="fono_particular" value="{{ cliente.fono_particular or '' }}" class="field">
        <input name="fono_oficina" value="{{ cliente.fono_oficina or '' }}" class="field">
        <input name="forma_pago_default" value="{{ cliente.forma_pago_default or '' }}" class="field">
        <input name="direccion" value="{{ cliente.direccion or '' }}" class="field md:col-span-2">
        <input name="ciudad" value="{{ cliente.ciudad or '' }}" class="field">
        <input name="comuna" value="{{ cliente.comuna or '' }}" class="field">
        <div class="md:col-span-2 flex justify-end">
            <button class="btn-primary" type="submit">Guardar cambios</button>
        </div>
    </form>
</section>
{% endblock %}
