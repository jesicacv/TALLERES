{% extends "base/layout.html" %}
{% block title %}Editar Tecnico | {{ app_name }}{% endblock %}
{% block content %}
<section class="space-y-4 max-w-3xl">
    <div class="flex items-center justify-between"><h3 class="text-2xl font-semibold">Editar Tecnico #{{ tecnico.id }}</h3><a href="/maestros/tecnicos" class="btn-secondary">Volver</a></div>
    <form method="post" action="/maestros/tecnicos/{{ tecnico.id }}/edit" class="grid grid-cols-1 md:grid-cols-2 gap-3 bg-white border border-slate-200 rounded-2xl p-4">
        <input required name="codigo" value="{{ tecnico.codigo }}" class="field">
        <input required name="nombre" value="{{ tecnico.nombre }}" class="field">
        <label class="inline-flex items-center gap-2 md:col-span-2"><input type="checkbox" name="activo" {% if tecnico.activo %}checked{% endif %}>Activo</label>
        <div class="md:col-span-2 flex justify-end"><button class="btn-primary" type="submit">Guardar cambios</button></div>
    </form>
</section>
{% endblock %}
