<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contrasena · {{ app_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { tallerGreen: "#1B6B5A", tallerBlue: "#1B3F7A" },
                    fontFamily: { sans: ["Poppins", "ui-sans-serif", "system-ui", "sans-serif"] },
                },
            },
        };
    </script>
    <style>
        html, body { font-family: "Poppins", ui-sans-serif, system-ui, sans-serif; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="bg-gradient-to-r from-tallerGreen to-tallerBlue text-white rounded-t-2xl px-6 py-5">
            <h1 class="text-lg font-semibold tracking-wide">Cambiar contrasena</h1>
            <p class="text-xs text-slate-100/90">{{ app_name }}</p>
        </div>
        <form method="post" action="/cambiar-password" class="bg-white rounded-b-2xl shadow px-6 py-6 space-y-4">
            {% if forzado %}
            <div class="rounded-lg bg-amber-50 border border-amber-200 text-amber-800 text-sm px-3 py-2">
                Debes definir una nueva contrasena antes de continuar.
            </div>
            {% endif %}
            {% if error %}
            <div class="rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm px-3 py-2">{{ error }}</div>
            {% endif %}
            <div>
                <label for="password_actual" class="block text-sm font-medium text-slate-700 mb-1">Contrasena actual</label>
                <input id="password_actual" name="password_actual" type="password" required autocomplete="current-password"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tallerBlue">
            </div>
            <div>
                <label for="password_nueva" class="block text-sm font-medium text-slate-700 mb-1">Nueva contrasena</label>
                <input id="password_nueva" name="password_nueva" type="password" required minlength="8" autocomplete="new-password"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tallerBlue">
                <p class="text-xs text-slate-500 mt-1">Minimo 8 caracteres.</p>
            </div>
            <div>
                <label for="password_confirmacion" class="block text-sm font-medium text-slate-700 mb-1">Confirmar nueva contrasena</label>
                <input id="password_confirmacion" name="password_confirmacion" type="password" required minlength="8" autocomplete="new-password"
                       class="w-full rounded-lg border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-tallerBlue">
            </div>
            <button type="submit"
                    class="w-full rounded-lg bg-tallerBlue text-white font-medium py-2 hover:brightness-110 transition">
                Guardar
            </button>
            {% if not forzado %}
            <a href="/" class="block text-center text-sm text-slate-500 hover:text-slate-700">Volver al inicio</a>
            {% endif %}
        </form>
    </div>
</body>
</html>
