{% extends "base/layout.html" %}
{% block title %}Editar Vehiculo | {{ app_name }}{% endblock %}
{% block content %}
<section class="space-y-4 max-w-5xl">
    <div class="flex items-center justify-between">
        <h3 class="text-2xl font-semibold">Editar Vehiculo {{ vehiculo.patente }}</h3>
        <a href="/maestros/vehiculos" class="btn-secondary">Volver</a>
    </div>

    <form method="post" action="/maestros/vehiculos/{{ vehiculo.patente }}/edit" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3 bg-white border border-slate-200 rounded-2xl p-4">
        <select required name="cliente_rut" class="field">
            {% for c in clientes %}<option value="{{ c.rut }}" {% if c.rut == vehiculo.cliente_rut %}selected{% endif %}>{{ c.rut }} - {{ c.nombre }}</option>{% endfor %}
        </select>
        <input required name="marca" value="{{ vehiculo.marca }}" class="field">
        <input required name="modelo" value="{{ vehiculo.modelo }}" class="field">
        <input name="sub_modelo" value="{{ vehiculo.sub_modelo or '' }}" class="field">
        <select required name="tipo" class="field">
            {% for t in tipos_vehiculo %}<option value="{{ t }}" {% if t == vehiculo.tipo.value %}selected{% endif %}>{{ t }}</option>{% endfor %}
        </select>
        <input type="number" name="anio" value="{{ vehiculo.anio or '' }}" class="field">
        <input name="color" value="{{ vehiculo.color or '' }}" class="field">
        <input name="chasis_vin" value="{{ vehiculo.chasis_vin or '' }}" class="field md:col-span-2 xl:col-span-2">
        <div class="md:col-span-2 xl:col-span-3 flex justify-end"><button class="btn-primary" type="submit">Guardar cambios</button></div>
    </form>
</section>
{% endblock %}
