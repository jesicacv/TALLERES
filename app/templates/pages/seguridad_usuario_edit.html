{% extends "base/layout.html" %}
{% block title %}Editar Usuario | {{ app_name }}{% endblock %}
{% block content %}
<section class="space-y-4 max-w-5xl">
    <div class="flex items-center justify-between"><h3 class="text-2xl font-semibold">Editar Usuario {{ usuario.username }}</h3><a href="/seguridad/usuarios" class="btn-secondary">Volver</a></div>

    <form method="post" action="/seguridad/usuarios/{{ usuario.id }}/edit" class="grid grid-cols-1 md:grid-cols-2 gap-3 bg-white border border-slate-200 rounded-2xl p-4">
        <input required name="email" value="{{ usuario.email }}" class="field">
        <input required name="nombre_completo" value="{{ usuario.nombre_completo }}" class="field">
        <input type="password" name="new_password" placeholder="Nueva password (opcional)" class="field md:col-span-2">
        <label class="inline-flex items-center gap-2"><input type="checkbox" name="activo" {% if usuario.activo %}checked{% endif %}>Activo</label>
        <label class="inline-flex items-center gap-2"><input type="checkbox" name="debe_cambiar_password" {% if usuario.debe_cambiar_password %}checked{% endif %}>Debe cambiar password</label>

        <div class="md:col-span-2">
            <p class="text-sm font-medium text-slate-700 mb-2">Roles</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                {% for rol in roles %}
                <label class="inline-flex items-center gap-2"><input type="checkbox" name="role_ids" value="{{ rol.id }}" {% if rol.id in current_roles %}checked{% endif %}>{{ rol.nombre }}</label>
                {% endfor %}
            </div>
        </div>

        <div class="md:col-span-2 flex justify-end"><button class="btn-primary" type="submit">Guardar cambios</button></div>
    </form>
</section>
{% endblock %}
