{% extends "base/layout.html" %}

{% block title %}Dashboard | {{ app_name }}{% endblock %}

{% block content %}
<section class="space-y-5">
    <div class="flex flex-col md:flex-row md:items-end md:justify-between gap-3">
        <div>
            <h3 class="text-2xl font-semibold text-slate-900">Resumen del Taller</h3>
            <p class="text-slate-600">Vista operacional diaria con KPIs reales, estado de OT y actividad reciente.</p>
        </div>

        <button
            class="inline-flex items-center justify-center px-4 py-2 rounded-xl bg-tallerGreen text-white hover:brightness-110 transition"
            hx-get="/partials/dashboard-kpis"
            hx-target="#kpi-wrap"
            hx-swap="innerHTML"
        >
            Actualizar KPIs
        </button>
    </div>

    <div id="kpi-wrap">
        {% include "components/dashboard_overview.html" %}
    </div>
</section>
{% endblock %}
